<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  {% feed_meta %}
  {% seo %}
  <style>
    :root { --ink:#2a2a2a; --soft:#888; --accent:#7a4ad6; --bg:#fafaf7; }
    body { font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif; max-width: 720px; margin: 0 auto; padding: 24px; color: var(--ink); background: var(--bg); line-height: 1.75; }
    header { padding: 16px 0 32px; border-bottom: 1px solid #e5e5e0; margin-bottom: 32px; }
    header a { font-size: 22px; font-weight: 600; color: var(--ink); text-decoration: none; }
    header .tag { color: var(--soft); font-size: 14px; margin-left: 8px; }
    article h1 { font-size: 28px; margin: 0 0 8px; }
    article time { color: var(--soft); font-size: 14px; }
    article img { max-width: 100%; height: auto; border-radius: 4px; margin: 16px 0; }
    .post-list { list-style: none; padding: 0; }
    .post-list li { padding: 12px 0; border-bottom: 1px dashed #e5e5e0; }
    .post-list a { color: var(--ink); text-decoration: none; font-weight: 500; }
    .post-list a:hover { color: var(--accent); }
    .post-list .date { color: var(--soft); font-size: 13px; margin-left: 8px; }
    footer { margin-top: 64px; padding-top: 24px; border-top: 1px solid #e5e5e0; color: var(--soft); font-size: 13px; text-align: center; }
  </style>
</head>
<body>
  <header>
    <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <span class="tag">{{ site.description }}</span>
  </header>
  <main>{{ content }}</main>
  <footer>© {{ site.time | date: "%Y" }} {{ site.author }} · <a href="{{ '/feed.xml' | relative_url }}">RSS</a></footer>
</body>
</html>
