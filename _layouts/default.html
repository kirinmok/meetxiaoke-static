<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncate: 160 }}">
  {% feed_meta %}
  {% seo %}
  <style>
    :root { --ink:#2a2a2a; --soft:#888; --accent:#7a4ad6; --bg:#fafaf7; }
    body { font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif; max-width: 720px; margin: 0 auto; padding: 24px; color: var(--ink); background: var(--bg); line-height: 1.75; }
    header { padding: 24px 0 32px; border-bottom: 1px solid #e5e5e0; margin-bottom: 40px; text-align: center; }
    header .site-title { display: block; font-size: 28px; font-weight: 600; color: var(--ink); text-decoration: none; letter-spacing: 0.04em; margin-bottom: 12px; }
    header .site-tag { display: block; color: var(--soft); font-size: 14px; letter-spacing: 0.03em; }
    article h1 { font-size: 28px; margin: 0 0 8px; }
    article time { color: var(--soft); font-size: 14px; }
    article img { max-width: 100%; height: auto; border-radius: 4px; margin: 16px 0; }
    .hero { position: relative; margin: 0 0 24px; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,.12); }
    .hero img { width: 100%; height: auto; display: block; }
    .tagline { margin: 0 0 40px; text-align: center; color: var(--soft); font-size: 15px; letter-spacing: 0.04em; line-height: 1.6; }
    body.home header { display: none; }
    body.home { padding-top: 12px; }
    .content .hashtag-line { margin-top: 48px; padding-top: 18px; border-top: 1px dashed #e5e5e0; color: var(--soft); font-size: 13px; letter-spacing: 0.02em; line-height: 1.8; }
    .post-nav { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; margin: 56px 0 24px; padding: 24px 0; border-top: 1px dashed #d0c8e0; font-size: 14px; }
    .post-nav a { text-decoration: none; color: var(--ink); padding: 10px 14px; border-radius: 8px; transition: all .2s; display: flex; flex-direction: column; line-height: 1.5; }
    .post-nav a:hover { background: rgba(122, 74, 214, 0.08); color: var(--accent); }
    .post-nav .nav-arrow { font-size: 18px; color: var(--accent); }
    .post-nav .nav-label { color: var(--soft); font-size: 12px; letter-spacing: 0.05em; }
    .post-nav .nav-title { font-weight: 500; margin-top: 2px; }
    .post-nav .nav-prev { justify-self: start; text-align: left; }
    .post-nav .nav-home { justify-self: center; align-items: center; text-align: center; font-weight: 500; color: var(--accent); border: 1px dashed #d0c8e0; }
    .post-nav .nav-home:hover { border-color: var(--accent); }
    .post-nav .nav-next { justify-self: end; text-align: right; align-items: flex-end; }
    .post-nav .nav-empty { display: block; }
    @media (max-width: 600px) {
      .post-nav { grid-template-columns: 1fr; }
      .post-nav .nav-prev, .post-nav .nav-next, .post-nav .nav-home { justify-self: stretch; text-align: center; align-items: center; }
    }
    .pager { display: flex; justify-content: center; align-items: center; gap: 6px; margin: 24px 0; flex-wrap: wrap; }
    .pager button { background: transparent; border: 1px solid #d0c8e0; color: var(--ink); width: 36px; height: 36px; border-radius: 6px; cursor: pointer; font-size: 14px; transition: all .15s; font-family: inherit; padding: 0; }
    .pager button:hover:not(:disabled) { background: rgba(122, 74, 214, 0.08); border-color: var(--accent); color: var(--accent); }
    .pager button.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }
    .pager button:disabled { opacity: 0.3; cursor: not-allowed; }
    .pager-bottom { margin: 12px 0 32px; }
    .post-list { list-style: none; padding: 0; }
    .post-list li { padding: 12px 0; border-bottom: 1px dashed #e5e5e0; }
    .post-list a { color: var(--ink); text-decoration: none; font-weight: 500; }
    .post-list a:hover { color: var(--accent); }
    .post-list .date { color: var(--soft); font-size: 13px; margin-left: 8px; }
    footer { margin-top: 64px; padding-top: 24px; border-top: 1px solid #e5e5e0; color: var(--soft); font-size: 13px; text-align: center; }
  </style>
</head>
<body class="{% if page.url == '/' %}home{% endif %}">
  <header>
    <a href="{{ '/' | relative_url }}" class="site-title">{{ site.title }}</a>
    <span class="site-tag">{{ site.description }}</span>
  </header>
  <main>{{ content }}</main>
  <footer>© {{ site.time | date: "%Y" }} {{ site.author }} · <a href="{{ '/feed.xml' | relative_url }}">RSS</a></footer>
  <script>
    // 內文 hashtag 行加分隔空白 + 灰色樣式
    document.querySelectorAll('article .content p').forEach(p => {
      const t = p.textContent.trim();
      if (!t.startsWith('#')) return;
      if (t.split(/\s+/).every(w => w.startsWith('#'))) {
        p.classList.add('hashtag-line');
      }
    });
  </script>
</body>
</html>
